<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success VLCM – CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {

              50:'#f4f9ec', 100:'#e4f2c4', 200:'#c8e58a', 300:'#a3d14a',

    .status-badge { display:inline-flex; align-items:center; padding:3px 12px; border-radius:9999px; font-size:12px; font-weight:600; letter-spacing:.01em; }
    .note-card        { border-left: 4px solid #5ba300; background: #f6fdf0; }
    .call-card        { border-left: 4px solid #3b4f5f; background: #f0f4f7; }
    .text-card        { border-left: 4px solid #7c3aed; background: #f7f3ff; }
    .email-card       { border-left: 4px solid #ff7a2a; background: #fff7f2; }
    .appointment-card { border-left: 4px solid #2563eb; background: #eff6ff; }
    .update-card      { border-left: 4px solid #94a3b8; background: #f8fafc; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background:#f1f1f1; } ::-webkit-scrollbar-thumb { background:#ccc; border-radius:3px; }

    .ql-toolbar { border-top-left-radius: 12px; border-top-right-radius: 12px; background: #f9fafb; }
    .ql-container, .ql-toolbar { border-color: #e5e7eb !important; }

    .ql-editor.ql-blank::before { color: #9ca3af; font-style: normal; }

<body class="text-gray-800">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const LEARNING_CENTERS = [
  'Flint','Grand Rapids','Hazel Park','Lansing South','Lansing West',
  'Monroe','Muskegon','Port Huron','Taylor','Waterford-Pontiac','Other'
];
const LEAD_STATUSES = [
  'New Inquiry','1st Contact Attempt','2nd Contact Attempt','3rd Contact Attempt',
  'Qualified','Appointment Scheduled','Appointment Completed – Enrolled',
  'Appointment Completed – Not Qualified','Sent to Student Services','Not Qualified'
];
// Simplified stage shown top-right of profile
const STAGES = [
  { key:'open',        label:'New Inquiry',   color:'bg-blue-100 text-blue-700' },
  { key:'contact',     label:'In Contact',    color:'bg-yellow-100 text-yellow-700' },
  { key:'qualified',   label:'Qualified',     color:'bg-purple-100 text-purple-700' },
  { key:'enrolled',    label:'Enrolled',      color:'bg-green-100 text-green-800' },
  { key:'unqualified', label:'Not Qualified', color:'bg-red-100 text-red-700' },
];
const stageFromStatus = (s) => {
  if (!s || s === 'New Inquiry') return 'open';
  if (s.includes('Contact Attempt')) return 'contact';
  if (s === 'Qualified' || s === 'Appointment Scheduled') return 'qualified';
  if (s.includes('Enrolled')) return 'enrolled';
  if (s.includes('Not Qualified') || s === 'Not Qualified') return 'unqualified';
  if (s === 'Sent to Student Services') return 'enrolled';
  return 'open';
};
const APPOINTMENT_RESULTS = ['Enrollment Appointment Scheduled','Enrolled','Needs Follow Up','No Show','Rescheduled','Cancelled','Student Not Qualified'];
const LEAD_SOURCES = ['Website','Referral','School District','Social Media','Community Event','Phone Inquiry','Email','Walk-In','Other'];
const DOC_TYPES = ['State ID / Photo ID','Birth Certificate','Transcript','IEP / 504 Plan','Enrollment Agreement','Proof of Residency','Other'];
const ACTIVITY_TYPES = [
  { key:'note',        label:'Note',               icon:'📝', cardClass:'note-card',        iconBg:'bg-green-50',  loggable:true },
  { key:'call',        label:'Call',               icon:'📞', cardClass:'call-card',        iconBg:'bg-slate-50',  loggable:true },
  { key:'text',        label:'Text',               icon:'💬', cardClass:'text-card',        iconBg:'bg-purple-50', loggable:true },
  { key:'email',       label:'Email',              icon:'📧', cardClass:'email-card',       iconBg:'bg-orange-50', loggable:true },
  { key:'appointment', label:'Appointment Change', icon:'📅', cardClass:'appointment-card', iconBg:'bg-blue-50',   loggable:false },
  { key:'update',      label:'Details Updated',    icon:'✏️', cardClass:'update-card',      iconBg:'bg-gray-50',   loggable:false },
];
const STATUS_COLORS = {
  'New Inquiry':'bg-blue-100 text-blue-700',
  '1st Contact Attempt':'bg-yellow-100 text-yellow-700',
  '2nd Contact Attempt':'bg-yellow-100 text-yellow-700',
  '3rd Contact Attempt':'bg-orange-100 text-orange-700',
  'Qualified':'bg-purple-100 text-purple-700',
  'Appointment Scheduled':'bg-indigo-100 text-indigo-700',
  'Appointment Completed – Enrolled':'bg-green-100 text-green-800',
  'Appointment Completed – Not Qualified':'bg-red-100 text-red-700',
  'Sent to Student Services':'bg-teal-100 text-teal-700',
  'Not Qualified':'bg-gray-100 text-gray-600',
};

// ─── FIREBASE ────────────────────────────────────────────────────────────────
let db = null, auth = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtDate(ts) {
  if (!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function fmtDateTime(ts) {
  if (!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
}
function timeAgo(ts) {
  if (!ts) return ''; const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = Date.now() - d.getTime(), mins = Math.floor(diff/60000);
  if (mins < 1) return 'just now'; if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60); if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs/24); if (days < 7) return `${days}d ago`;
  return fmtDate(ts);
}
function calcAge(dob) {
  if (!dob) return ''; const birth = new Date(dob), now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  if (now < new Date(now.getFullYear(), birth.getMonth(), birth.getDate())) age--;
  return age;
}

// ─── SETUP PAGE ───────────────────────────────────────────────────────────────
function SetupPage({ onDone }) {
  const [config, setConfig] = useState({ apiKey:'', authDomain:'', projectId:'', storageBucket:'', messagingSenderId:'', appId:'' });
  const [error, setError] = useState('');
  function handleSave() {
    if (!config.apiKey || !config.projectId) { setError('API Key and Project ID are required.'); return; }
    if (initFirebase(config)) { localStorage.setItem('success_crm_fb_config', JSON.stringify(config)); onDone(); }
    else setError('Could not connect. Check your config and try again.');
  }
  const fields = [
    {key:'apiKey',label:'API Key'},{key:'authDomain',label:'Auth Domain'},
    {key:'projectId',label:'Project ID'},{key:'storageBucket',label:'Storage Bucket'},
    {key:'messagingSenderId',label:'Messaging Sender ID'},{key:'appId',label:'App ID'},
  ];
  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'linear-gradient(135deg,#3b4f5f 0%,#5ba300 100%)'}}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-8">
        <div className="text-center mb-6">
          <div className="text-4xl mb-2">🎓</div>
          <h1 className="text-2xl font-bold" style={{color:'#5ba300'}}>Success VLCM CRM</h1>
          <p className="text-gray-500 mt-1 text-sm">Connect your Firebase project to get started.<br/>
            <a href="https://console.firebase.google.com" target="_blank" className="underline" style={{color:'#5ba300'}}>Open Firebase Console →</a>
          </p>
        </div>
        <div className="space-y-3">
          {fields.map(f=>(
            <div key={f.key}>
              <label className="block text-xs font-semibold text-gray-500 mb-1">{f.label}</label>
              <input className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
                value={config[f.key]} onChange={e=>setConfig(c=>({...c,[f.key]:e.target.value}))} />
            </div>
          ))}
        </div>
        {error && <p className="text-red-500 text-sm mt-3">{error}</p>}
        <button onClick={handleSave} className="mt-5 w-full text-white font-semibold py-2.5 rounded-lg transition" style={{background:'#5ba300'}}>
          Connect to Firebase
        </button>
        <div className="mt-5 bg-green-50 rounded-lg p-4 text-xs text-green-800">
          <p className="font-semibold mb-1">How to find your config:</p>
          <ol className="list-decimal list-inside space-y-1">
            <li>Go to console.firebase.google.com</li>
            <li>Gear icon → Project Settings → Your apps → Add app → Web</li>
            <li>Copy the firebaseConfig values here</li>
            <li>Enable Firestore Database and Authentication → Google</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

// ─── LOGIN PAGE ───────────────────────────────────────────────────────────────
function LoginPage() {
  const [error, setError] = useState('');
  async function signIn() {
    try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    catch(e) { setError('Sign-in failed: ' + e.message); }
  }
  return (
    <div className="min-h-screen flex items-center justify-center" style={{background:'linear-gradient(135deg,#3b4f5f 0%,#5ba300 100%)'}}>
      <div className="bg-white rounded-2xl shadow-2xl p-10 text-center max-w-sm w-full">
        <div className="text-4xl mb-3">🎓</div>
        <h1 className="text-2xl font-bold mb-1" style={{color:'#5ba300'}}>Success VLCM</h1>
        <p className="text-gray-500 text-sm mb-6">Student Enrollment CRM</p>
        <button onClick={signIn} className="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-lg py-2.5 hover:bg-gray-50 transition font-medium">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.2 33.8 29.6 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 6 1.1 8.1 3l6.4-6.4C34.8 5 29.6 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c12 0 21-8.4 21-21 0-1.4-.1-2.7-.5-4z"/><path fill="#34A853" d="M6.3 14.7l7 5.1C15.1 16.1 19.2 13 24 13c3.1 0 6 1.1 8.1 3l6.4-6.4C34.8 5 29.6 3 24 3 16.4 3 9.8 7.9 6.3 14.7z"/><path fill="#FBBC05" d="M24 45c5.5 0 10.5-1.9 14.4-5l-6.7-5.5C29.6 36 26.9 37 24 37c-5.6 0-10.2-3.2-11.8-7.8l-6.9 5.3C9.7 41.1 16.4 45 24 45z"/><path fill="#EA4335" d="M44.5 20H24v8.5h11.8c-1 2.8-2.9 5-5.3 6.5l6.7 5.5C41 37.2 45 31.2 45 24c0-1.4-.1-2.7-.5-4z"/></svg>
          Sign in with Google
        </button>
        {error && <p className="text-red-500 text-xs mt-3">{error}</p>}
      </div>
    </div>
  );
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children, wide }) {
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className={`bg-white rounded-2xl shadow-2xl ${wide ? 'max-w-2xl' : 'max-w-lg'} w-full p-6 fade-in`} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-bold text-lg">{title}</h2>
          <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── STATUS BADGE ────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  return <span className={`status-badge ${STATUS_COLORS[status] || 'bg-gray-100 text-gray-600'}`}>{status || 'No Status'}</span>;
}
function StageBadge({ stageKey }) {
  const s = STAGES.find(x=>x.key===stageKey) || STAGES[0];
  return <span className={`status-badge ${s.color}`}>{s.label}</span>;
}

// ─── QUICK INFO SIDEBAR ───────────────────────────────────────────────────────
function QuickInfoSidebar({ student }) {
  const InfoRow = ({ icon, label, value, href }) => {
    if (!value) return null;
    return (
      <div className="mb-3">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-0.5">{label}</div>
        {href ? (
          <a href={href} className="text-sm font-medium hover:underline flex items-center gap-1" style={{color:'#3b4f5f'}}>
            <span>{icon}</span> {value}
          </a>
        ) : (
          <div className="text-sm text-gray-700 flex items-center gap-1"><span>{icon}</span> {value}</div>
        )}
      </div>
    );
  };
  return (
    <div className="w-64 flex-shrink-0 space-y-3">
      {/* Student */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
        <div className="text-xs font-bold uppercase tracking-widest mb-3 pb-2 border-b border-gray-100" style={{color:'#3b4f5f'}}>Student</div>
        <InfoRow icon="📞" label="Phone" value={student.student_phone} href={student.student_phone ? `tel:${student.student_phone}` : null} />
        <InfoRow icon="📧" label="Email" value={student.student_email} href={student.student_email ? `mailto:${student.student_email}` : null} />
        {!student.student_phone && !student.student_email && (
          <p className="text-xs text-gray-400">No contact info on file.</p>
        )}
      </div>
      {/* Guardian */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
        <div className="text-xs font-bold uppercase tracking-widest mb-3 pb-2 border-b border-gray-100" style={{color:'#3b4f5f'}}>Parent / Guardian</div>
        {(student.guardian_first_name || student.guardian_last_name) && (
          <div className="text-sm font-semibold text-gray-700 mb-2">
            {student.guardian_first_name} {student.guardian_last_name}
          </div>
        )}
        <InfoRow icon="📞" label="Phone" value={student.guardian_phone} href={student.guardian_phone ? `tel:${student.guardian_phone}` : null} />
        <InfoRow icon="📧" label="Email" value={student.guardian_email} href={student.guardian_email ? `mailto:${student.guardian_email}` : null} />
        {!student.guardian_phone && !student.guardian_email && !student.guardian_first_name && (
          <p className="text-xs text-gray-400">No guardian info on file.</p>
        )}
      </div>
      {/* Enrollment quick view */}
      {(student.enrollment_appointment_time || student.learning_center) && (
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
          <div className="text-xs font-bold uppercase tracking-widest mb-3 pb-2 border-b border-gray-100" style={{color:'#3b4f5f'}}>Enrollment</div>
          <InfoRow icon="📍" label="Center" value={student.learning_center} />
          {student.center_address && <InfoRow icon="🏠" label="Address" value={student.center_address} />}
          {student.enrollment_appointment_time && (
            <div className="mb-2">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-0.5">Appointment</div>
              <div className="text-sm text-gray-700">
                {new Date(student.enrollment_appointment_time).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}
              </div>
            </div>
          )}
          {student.enrollment_appointment_result && <InfoRow icon="✅" label="Result" value={student.enrollment_appointment_result} />}
        </div>
      )}
    </div>
  );
}

// ─── REPORTS TAB ─────────────────────────────────────────────────────────────
const REPORT_FIELDS = [
  { key:'student_first_name',   label:'First Name' },
  { key:'student_last_name',    label:'Last Name' },
  { key:'student_phone',        label:'Student Phone' },
  { key:'student_email',        label:'Student Email' },
  { key:'dob',                  label:'Date of Birth' },
  { key:'guardian_first_name',  label:'Guardian First Name' },
  { key:'guardian_last_name',   label:'Guardian Last Name' },
  { key:'guardian_phone',       label:'Guardian Phone' },
  { key:'guardian_email',       label:'Guardian Email' },
  { key:'learning_center',      label:'Learning Center' },
  { key:'lead_status',          label:'Lead Status' },
  { key:'source',               label:'How They Heard About Us' },
  { key:'enrollment_appointment_time',   label:'Appointment Date/Time' },
  { key:'enrollment_appointment_result', label:'Appointment Result' },
  { key:'center_address',       label:'Center Address' },
  { key:'center_phone',         label:'Center Phone' },
  { key:'created_at',           label:'Date Added' },
];

const PRESET_REPORTS = [
  { id:'all',           label:'All Students',              desc:'Every student in the CRM',                filter: ()=>true },
  { id:'enrolled',      label:'Enrolled Students',         desc:'Appointment completed — enrolled',         filter: l=>l.lead_status==='Appointment Completed – Enrolled' },
  { id:'appt_sched',    label:'Appointments Scheduled',    desc:'Status = Appointment Scheduled',           filter: l=>l.lead_status==='Appointment Scheduled' },
  { id:'sts',           label:'Sent to Student Services',  desc:'Documents sent, awaiting processing',      filter: l=>l.lead_status==='Sent to Student Services' },
  { id:'not_qualified', label:'Not Qualified',             desc:'Leads that did not qualify',               filter: l=>l.lead_status==='Not Qualified' },
  { id:'new_30',        label:'New Inquiries – Last 30 Days', desc:'Students added in the past 30 days',   filter: l=>{ const d=l.created_at?.toDate?.(); return d && d >= new Date(Date.now()-30*864e5); } },
  { id:'appt_month',    label:'Appointments This Month',   desc:'Appointments in the current calendar month', filter: l=>{
    if(!l.enrollment_appointment_time) return false;
    const d=new Date(l.enrollment_appointment_time), now=new Date();
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }},
];

const DEFAULT_FIELDS = ['student_first_name','student_last_name','student_phone','student_email','learning_center','lead_status'];

function ReportsTab() {
  const [leads, setLeads] = useState([]);
  const [loadingLeads, setLoadingLeads] = useState(true);
  const [selectedPreset, setSelectedPreset] = useState('all');
  const [selectedFields, setSelectedFields] = useState(DEFAULT_FIELDS);
  const [preview, setPreview] = useState(null); // rows to show in preview table

  useEffect(()=>{
    return db.collection('students').onSnapshot(snap=>{
      setLeads(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoadingLeads(false);
    });
  },[]);

  const preset = PRESET_REPORTS.find(p=>p.id===selectedPreset);
  const filteredLeads = leads.filter(preset.filter);

  function toggleField(key) {
    setSelectedFields(f => f.includes(key) ? f.filter(k=>k!==key) : [...f, key]);
  }

  function getDisplayVal(lead, key) {
    const val = lead[key];
    if (!val) return '';
    if (key === 'created_at') {
      const d = val?.toDate?.(); return d ? d.toLocaleDateString() : '';
    }
    if (key === 'enrollment_appointment_time') {
      return new Date(val).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
    }
    return val;
  }

  function downloadCSV() {
    const orderedFields = REPORT_FIELDS.filter(f => selectedFields.includes(f.key));
    const header = orderedFields.map(f => `"${f.label}"`).join(',');
    const rows = filteredLeads.map(l =>
      orderedFields.map(f => `"${(getDisplayVal(l, f.key)||'').replace(/"/g,'""')}"`).join(',')
    );
    const csv = [header, ...rows].join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${preset.label.replace(/[^a-z0-9]/gi,'_')}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click(); URL.revokeObjectURL(url);
  }

  if (loadingLeads) return <div className="py-16 text-center text-gray-400 text-sm">Loading student data…</div>;

  const orderedFields = REPORT_FIELDS.filter(f => selectedFields.includes(f.key));

  return (
    <div>
      <p className="text-sm text-gray-500 mb-5">Choose a report type, select the fields to include, then preview or export to CSV.</p>

      {/* Preset selector */}
      <div className="mb-5">
        <label className="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-2">Report Type</label>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {PRESET_REPORTS.map(p => (
            <button key={p.id} onClick={() => setSelectedPreset(p.id)}
              className={`text-left px-4 py-3 rounded-xl border text-sm transition ${selectedPreset===p.id ? 'border-transparent text-white' : 'border-gray-200 text-gray-700 hover:border-gray-300 bg-white'}`}
              style={selectedPreset===p.id?{background:'#3b4f5f'}:{}}>
              <div className="font-semibold">{p.label}</div>
              <div className={`text-xs mt-0.5 ${selectedPreset===p.id?'text-white/70':'text-gray-400'}`}>{p.desc}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Field picker */}
      <div className="mb-5 bg-white rounded-2xl border border-gray-100 shadow-sm p-5">
        <div className="flex items-center justify-between mb-3">
          <label className="text-xs font-bold uppercase tracking-wider text-gray-500">Fields to Include</label>

      {preview && (

        </div>
      )}
    </div>
  );
}

// ─── QUILL RICH TEXT EDITOR ──────────────────────────────────────────────────
function QuillEditor({ initialValue, onChange, placeholder }) {
  const containerRef = useRef(null);
  const quillRef     = useRef(null);

  useEffect(() => {
    if (quillRef.current) return;
    quillRef.current = new Quill(containerRef.current, {
      theme: 'snow',
      placeholder: placeholder || 'Write your email body here…',
      modules: {
        toolbar: [
          ['bold','italic','underline','strike'],
          [{ header:[1,2,3,false] }],
          [{ list:'ordered' },{ list:'bullet' }],
          [{ color:[] },{ background:[] }],
          ['link','image'],
          ['clean'],
        ]
      }
    });
    if (initialValue) quillRef.current.root.innerHTML = initialValue;
    quillRef.current.on('text-change', () => {
      onChange(quillRef.current.root.innerHTML);
    });
  }, []);

  return <div ref={containerRef} />;
}

// ─── AI EMAIL WRITER ──────────────────────────────────────────────────────────
function AIEmailWriter({ onInsert }) {
  const [prompt, setPrompt]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [open, setOpen]       = useState(false);

  async function generate() {
    if (!prompt.trim()) return;
    setLoading(true); setError('');
    try {
      const res = await fetch('/api/ai', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: prompt.trim() })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'AI request failed');
      onInsert(data.html);
      setPrompt(''); setOpen(false);
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="mb-4">
      {!open ? (
        <button onClick={()=>setOpen(true)}
          className="flex items-center gap-2 text-sm font-semibold px-4 py-2 rounded-xl border border-purple-200 text-purple-600 hover:bg-purple-50 transition">
          ✨ Write with AI
        </button>
      ) : (
        <div className="bg-purple-50 border border-purple-200 rounded-2xl p-4">
          <div className="flex items-center justify-between mb-3">
            <span className="text-sm font-bold text-purple-700">✨ AI Email Writer</span>
            <button onClick={()=>{setOpen(false);setError('');}} className="text-purple-400 hover:text-purple-600 text-lg leading-none">×</button>
          </div>
          <p className="text-xs text-purple-500 mb-2">Describe the email you need and AI will draft the body for you to edit.</p>
          <textarea
            className="w-full border border-purple-200 rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 resize-none mb-3"
            style={{minHeight:'80px','--tw-ring-color':'#a855f7'}}
            placeholder="e.g. A warm follow-up email to a student who missed their enrollment appointment, encouraging them to reschedule…"
            value={prompt} onChange={e=>setPrompt(e.target.value)} />
          {error && <p className="text-xs text-red-500 mb-2">{error}</p>}
          <div className="flex gap-2">
            <button onClick={generate} disabled={loading||!prompt.trim()}
              className="text-white px-4 py-2 rounded-xl text-sm font-semibold disabled:opacity-50 hover:opacity-90"
              style={{background:'#7c3aed'}}>
              {loading ? 'Writing…' : 'Generate Draft'}
            </button>
            <button onClick={()=>{setOpen(false);setError('');}} className="text-purple-400 text-sm px-2">Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

    function handleClick(e) {
      if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setShowUser(false);
    }
    document.addEventListener('mousedown', handleClick);

  }, []);

  function go(p) { setPage(p); setShowUser(false); }

    <nav className="text-white px-6 py-3 flex items-center gap-5 shadow-lg z-40" style={{background:'#3b4f5f'}}>

// ─── DASHBOARD ───────────────────────────────────────────────────────────────
function DashboardPage({ onSelect }) {
  const [leads, setLeads] = useState([]);
  const [loading, setLoading] = useState(true);
  const [apptModal, setApptModal] = useState(null); // {title, students}

  useEffect(()=>{
    return db.collection('students').orderBy('created_at','desc').onSnapshot(snap=>{
      setLeads(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
    });
  },[]);

  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const tomorrowStart = new Date(todayStart.getTime() + 864e5);
  const tomorrowEnd   = new Date(todayStart.getTime() + 2*864e5);
  const weekEnd       = new Date(todayStart.getTime() + 7*864e5);
  const monthEnd      = new Date(todayStart.getTime() + 30*864e5);
  const weekAgo = new Date(now - 7*864e5);

  const withAppt = leads.filter(l => l.enrollment_appointment_time);
  const apptTomorrow = withAppt.filter(l => {
    const d = new Date(l.enrollment_appointment_time);
    return d >= tomorrowStart && d < tomorrowEnd;
  }).sort((a,b) => new Date(a.enrollment_appointment_time)-new Date(b.enrollment_appointment_time));
  const apptWeek = withAppt.filter(l => {
    const d = new Date(l.enrollment_appointment_time);
    return d >= todayStart && d < weekEnd;
  }).sort((a,b) => new Date(a.enrollment_appointment_time)-new Date(b.enrollment_appointment_time));
  const apptMonth = withAppt.filter(l => {
    const d = new Date(l.enrollment_appointment_time);
    return d >= todayStart && d < monthEnd;
  }).sort((a,b) => new Date(a.enrollment_appointment_time)-new Date(b.enrollment_appointment_time));

  const total = leads.length;
  const newWeek = leads.filter(l=>l.created_at?.toDate?.()>weekAgo).length;
  const enrolled = leads.filter(l=>l.lead_status?.includes('Enrolled')).length;
  const sts = leads.filter(l=>l.lead_status==='Sent to Student Services').length;
  const noShows = leads.filter(l=>l.enrollment_appointment_result==='No Show')
    .sort((a,b)=>new Date(b.enrollment_appointment_time||0)-new Date(a.enrollment_appointment_time||0));

  if (loading) return <div className="flex items-center justify-center h-64 text-gray-400 text-sm">Loading...</div>;

  const StatCard = ({label, val, color, sub, onClick}) => (
    <div onClick={onClick} className={`bg-white rounded-2xl border border-gray-100 shadow-sm p-5 transition ${onClick?'cursor-pointer hover:shadow-md':''}`}>
      <div className={`text-3xl font-extrabold ${color}`}>{val}</div>
      <div className="text-sm font-semibold text-gray-700 mt-1">{label}</div>
      {sub && <div className="text-xs mt-0.5">{sub}</div>}
    </div>
  );

  const ApptTile = ({label, sublabel, count, students, accent}) => (
    <button onClick={() => setApptModal({title: label, students})}
      className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 hover:shadow-md transition text-left w-full group">
      <div className="flex items-end justify-between">
        <div className="text-4xl font-extrabold" style={{color: accent}}>{count}</div>
        <span className="text-xs font-semibold text-gray-300 group-hover:text-gray-400 transition">View →</span>
      </div>
      <div className="text-sm font-bold text-gray-700 mt-2">{label}</div>
      <div className="text-xs text-gray-400 mt-0.5">{sublabel}</div>
    </button>
  );

  return (
    <div className="p-6 fade-in">
      {apptModal && <AppointmentModal title={apptModal.title} students={apptModal.students} onSelect={onSelect} onClose={()=>setApptModal(null)} />}

      <h1 className="text-2xl font-extrabold text-gray-900 mb-6">Dashboard</h1>

      {/* Top stat row */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
        <StatCard label="Total Inquiries" val={total} color="text-gray-800" />
        <StatCard label="New This Week" val={newWeek} color="text-blue-600" />
        <StatCard label="Enrolled" val={enrolled} color="text-green-700" />
        <StatCard label="Sent to Student Services" val={sts} color="text-teal-600" />
        <StatCard
          label="No Shows — Need Contact"
          val={noShows.length}
          color={noShows.length>0 ? 'text-red-600' : 'text-gray-400'}
          sub={noShows.length>0 ? <span className="text-red-400 font-semibold">Click to view ↗</span> : <span className="text-gray-400">None</span>}
          onClick={noShows.length>0 ? ()=>setApptModal({title:'No Shows — Need Contact', students:noShows}) : null}
        />
      </div>

      {/* Upcoming appointments — 3 tiles */}
      <div className="mb-6">
        <h2 className="font-bold text-gray-600 text-xs uppercase tracking-wider mb-3">Upcoming Enrollment Appointments</h2>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
          <ApptTile label="Tomorrow" sublabel={tomorrowStart.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}
            count={apptTomorrow.length} students={apptTomorrow} accent="#ff7a2a" />
          <ApptTile label="Next 7 Days" sublabel="Including today"
            count={apptWeek.length} students={apptWeek} accent="#3b4f5f" />
          <ApptTile label="Next 30 Days" sublabel="Including today"
            count={apptMonth.length} students={apptMonth} accent="#5ba300" />
        </div>
      </div>

      {/* Recent inquiries */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
        <h2 className="font-bold text-gray-600 text-xs uppercase tracking-wider mb-4">Recent Inquiries</h2>
        {leads.length===0 ? <p className="text-gray-400 text-sm">No leads yet.</p> : (
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
            {leads.slice(0,10).map(l=>(
              <div key={l.id} onClick={()=>onSelect(l.id)}
                className="flex items-center gap-3 cursor-pointer hover:bg-gray-50 px-2 py-2 rounded-xl transition">
                <div className="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0 text-white"
                  style={{background:'#5ba300'}}>
                  {(l.student_first_name||'?')[0]}{(l.student_last_name||'')[0]}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm text-gray-800">{l.student_first_name} {l.student_last_name}</div>
                  <div className="text-xs text-gray-400">{l.student_phone||l.contact_phone} {l.learning_center?`· ${l.learning_center}`:''}</div>
                </div>
                <StatusBadge status={l.lead_status} />
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function LeadsListPage({ user, onSelect, onAddNew }) {
  const [leads, setLeads] = useState([]);

  const [filterStatus, setFilterStatus] = useState('');
  const [filterCenter, setFilterCenter] = useState('');
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    return db.collection('students').orderBy('created_at','desc').onSnapshot(snap=>{
      setLeads(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
    });
  },[]);

  const filtered = leads.filter(l=>{
    const name=`${l.student_first_name||''} ${l.student_last_name||''}`.toLowerCase();

// ─── ACTIVITY FEED ────────────────────────────────────────────────────────────
function ActivityFeed({ studentId, user }) {
  const [activities, setActivities] = useState([]);
  const [loading, setLoading] = useState(true);
  const [actType, setActType] = useState('note');
  const [content, setContent] = useState('');
  const [saving, setSaving] = useState(false);
  const [showForm, setShowForm] = useState(false);
  const [filterType, setFilterType] = useState('');
  const [search, setSearch] = useState('');

  useEffect(()=>{
    return db.collection('students').doc(studentId).collection('activities')
      .orderBy('created_at','desc').onSnapshot(snap=>{
        setActivities(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
      });
  },[studentId]);

  async function add() {
    if(!content.trim()) return;
    setSaving(true);
    try {
      await db.collection('students').doc(studentId).collection('activities').add({
        type:actType, content:content.trim(),
        created_by: user.displayName||user.email,
        created_at: firebase.firestore.FieldValue.serverTimestamp(),
      });
      await db.collection('students').doc(studentId).update({ updated_at: firebase.firestore.FieldValue.serverTimestamp() });
      setContent(''); setShowForm(false);
    } finally { setSaving(false); }
  }

  const typeInfo = (t) => ACTIVITY_TYPES.find(x=>x.key===t) || ACTIVITY_TYPES[0];
  const loggableTypes = ACTIVITY_TYPES.filter(t=>t.loggable);

  const filtered = activities.filter(a=>{
    if(filterType && a.type !== filterType) return false;
    if(search && !a.content?.toLowerCase().includes(search.toLowerCase()) && !a.created_by?.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div>
      {/* Single Log button / form */}
      {!showForm ? (
        <div className="mb-5">
          <button onClick={()=>setShowForm(true)}
            className="flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-semibold text-white hover:opacity-90 transition shadow-sm"
            style={{background:'#5ba300'}}>
            ＋ Log Activity
          </button>
        </div>
      ) : (
        <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-4 mb-5">
          <div className="flex gap-2 mb-3 flex-wrap">
            {loggableTypes.map(t=>(
              <button key={t.key} onClick={()=>setActType(t.key)}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-sm font-semibold transition ${actType===t.key ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                style={actType===t.key?{background:'#3b4f5f'}:{}}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
          <textarea
            className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 min-h-[90px] resize-none"
            placeholder={`Write your ${actType} details here…`}
            value={content} onChange={e=>setContent(e.target.value)} autoFocus />
          <div className="flex items-center gap-2 mt-3">
            <button onClick={add} disabled={saving||!content.trim()}
              className="text-white px-5 py-2 rounded-xl text-sm font-semibold disabled:opacity-50 transition hover:opacity-90" style={{background:'#5ba300'}}>
              {saving?'Saving…':'Save'}
            </button>
            <button onClick={()=>{setShowForm(false);setContent('');}} className="text-gray-400 hover:text-gray-600 text-sm px-2">Cancel</button>
            <span className="ml-auto text-xs text-gray-400">Logged as {user.displayName||user.email}</span>
          </div>
        </div>
      )}

      {/* Search + filter bar */}
      <div className="flex gap-2 mb-4">
        <input type="text" value={search} onChange={e=>setSearch(e.target.value)}
          placeholder="Search activity…"
          className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
        <select value={filterType} onChange={e=>setFilterType(e.target.value)}
          className="border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white">
          <option value="">All Types</option>
          {ACTIVITY_TYPES.map(t=><option key={t.key} value={t.key}>{t.label}</option>)}
        </select>
      </div>

      {/* Feed */}
      {loading ? <div className="text-center py-10 text-gray-400 text-sm">Loading activity…</div> :
        filtered.length===0 ? (
          <div className="text-center py-14 text-gray-300">
            <div className="text-4xl mb-2">📋</div>
            <div className="text-sm font-medium">{activities.length===0 ? 'No activity yet' : 'No results match your filter'}</div>
            {activities.length===0 && <div className="text-xs mt-1">Log a call, note, or text above to get started</div>}
          </div>
        ) : (
          <div className="space-y-3">
            {filtered.map(a=>{
              const t=typeInfo(a.type);
              return (
                <div key={a.id} className={`rounded-2xl shadow-sm border border-gray-100 p-4 flex gap-3 ${t.cardClass}`}>
                  <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 text-base ${t.iconBg}`}>
                    {t.icon}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1.5 flex-wrap">
                      <span className="text-xs font-bold uppercase tracking-wider text-gray-500">{t.label}</span>
                      <span className="text-gray-300">·</span>
                      <span className="text-xs text-gray-500 font-medium">{a.created_by}</span>
                      <span className="text-gray-300">·</span>
                      <span className="text-xs text-gray-400" title={fmtDateTime(a.created_at)}>{timeAgo(a.created_at)}</span>
                    </div>
                    <div className="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">{a.content}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )
      }
    </div>
  );
}

// ─── DETAILS FORM HELPERS (module-level so React never unmounts inputs on re-render)
const FIELD_CLS = "w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 bg-white";

function FormSection({ title, children, cols=3 }) {
  const gridCls = cols===2 ? 'grid-cols-1 md:grid-cols-2' : 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3';
  return (
    <div className="mb-4 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
      <div className="px-5 py-3 border-b border-gray-100" style={{background:'#f0f4f7'}}>
        <h3 className="text-xs font-bold uppercase tracking-widest" style={{color:'#3b4f5f'}}>{title}</h3>
      </div>
      <div className={`p-5 grid ${gridCls} gap-4`}>{children}</div>
    </div>
  );
}
function FormField({ label, span, children }) {
  return (
    <div className={span ? 'md:col-span-2 lg:col-span-3' : ''}>
      <label className="block text-xs font-semibold text-gray-500 mb-1">{label}</label>
      {children}
    </div>
  );
}

// ─── DETAILS FORM ────────────────────────────────────────────────────────────
function DetailsForm({ student, studentId, user, adminCenters=[] }) {
  const [form, setForm] = useState({...student});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  function setLearningCenter(centerName) {
    const info = adminCenters.find(c=>c.name===centerName);
    const updates = { learning_center: centerName,
      ...(info?.address ? {center_address:info.address} : {}),
      ...(info?.phone   ? {center_phone:info.phone}     : {}),
      ...(info?.email   ? {center_email:info.email}     : {}),
    };
    setForm(f=>({...f,...updates}));
  }

  async function save() {
    setSaving(true);
    try {
      const TRACKED = {
        student_first_name:'Student First Name', student_last_name:'Student Last Name',
        student_dob:'Date of Birth', student_phone:'Student Phone', student_email:'Student Email',
        learning_center:'Learning Center', last_school_attended:'Last School Attended',
        iep_504:'IEP/504 Status', expelled:'Expelled Status', preferred_language:'Preferred Language',
        guardian_first_name:'Guardian First Name', guardian_last_name:'Guardian Last Name',
        guardian_phone:'Guardian Phone', guardian_email:'Guardian Email',
        enrollment_appointment_time:'Enrollment Appointment Time',
        enrollment_appointment_result:'Enrollment Appointment Result',
        center_phone:'Center Phone', center_address:'Center Address',
      };
      const APPT_KEYS = new Set(['enrollment_appointment_time','enrollment_appointment_result']);

      const detailChanges = [], apptChanges = [];
      for(const [k,label] of Object.entries(TRACKED)){
        const oldV = String(student[k]??''), newV = String(form[k]??'');
        if(oldV !== newV && (oldV||newV)){
          const line = `${label}: ${oldV||'—'} → ${newV||'—'}`;
          if(APPT_KEYS.has(k)) apptChanges.push(line);
          else detailChanges.push(line);
        }
      }

      const updatedForm = {...form, student_age: form.student_dob ? calcAge(form.student_dob) : (form.student_age||'')};
      await db.collection('students').doc(studentId).update({...updatedForm, updated_at: firebase.firestore.FieldValue.serverTimestamp()});

      const actRef = db.collection('students').doc(studentId).collection('activities');
      const who = user.displayName||user.email;
      const ts = firebase.firestore.FieldValue.serverTimestamp();
      if(detailChanges.length>0) await actRef.add({ type:'update', created_by:who, created_at:ts, content:'Student details updated:\n'+detailChanges.map(l=>`• ${l}`).join('\n') });
      if(apptChanges.length>0) await actRef.add({ type:'appointment', created_by:who, created_at:ts, content:'Enrollment appointment updated:\n'+apptChanges.map(l=>`• ${l}`).join('\n') });

      setSaved(true); setTimeout(()=>setSaved(false),2000);
    } finally { setSaving(false); }
  }

  return (
    <div>
      <FormSection title="Student Information">
        <FormField label="First Name">
          <input className={FIELD_CLS} value={form.student_first_name||''} onChange={e=>set('student_first_name',e.target.value)} />
        </FormField>
        <FormField label="Last Name">
          <input className={FIELD_CLS} value={form.student_last_name||''} onChange={e=>set('student_last_name',e.target.value)} />
        </FormField>
        <FormField label="Date of Birth">
          <input type="date" className={FIELD_CLS} value={form.student_dob||''}
            onChange={e=>setForm(f=>({...f, student_dob:e.target.value, student_age:calcAge(e.target.value)}))} />
        </FormField>
        <FormField label="Age">
          <input className={`${FIELD_CLS} bg-gray-50 text-gray-500`}
            value={form.student_age||(form.student_dob?calcAge(form.student_dob):'')} readOnly />
        </FormField>
        <FormField label="Learning Center">
          <select className={FIELD_CLS} value={form.learning_center||''} onChange={e=>setLearningCenter(e.target.value)}>
            <option value="">None Selected</option>
            {LEARNING_CENTERS.map(o=><option key={o}>{o}</option>)}
          </select>
        </FormField>
        <FormField label="Last School Attended">
          <input className={FIELD_CLS} value={form.last_school_attended||''} onChange={e=>set('last_school_attended',e.target.value)} />
        </FormField>
        <FormField label="IEP / 504 Status">
          <select className={FIELD_CLS} value={form.iep_504||''} onChange={e=>set('iep_504',e.target.value)}>
            <option value="">None Selected</option>
            <option>IEP</option><option>504 Plan</option><option>Neither</option>
          </select>
        </FormField>
        <FormField label="Expelled from Last School?">
          <select className={FIELD_CLS}
            value={form.expelled===true?'Yes':form.expelled===false?'No':''}
            onChange={e=>set('expelled',e.target.value==='Yes'?true:e.target.value==='No'?false:'')}>
            <option value="">None Selected</option><option>Yes</option><option>No</option>
          </select>
        </FormField>
        <FormField label="Preferred Language">
          <select className={FIELD_CLS} value={form.preferred_language||'English'} onChange={e=>set('preferred_language',e.target.value)}>
            <option>English</option><option>Spanish</option><option>Arabic</option><option>Other</option>
          </select>
        </FormField>
      </FormSection>

      <FormSection title="Student Contact" cols={2}>
        <FormField label="Student Phone">
          <input type="text" inputMode="tel" className={FIELD_CLS} placeholder="(555) 555-5555"
            value={form.student_phone||''} onChange={e=>set('student_phone',e.target.value)} />
        </FormField>
        <FormField label="Student Email">
          <input type="email" className={FIELD_CLS} value={form.student_email||''} onChange={e=>set('student_email',e.target.value)} />
        </FormField>
      </FormSection>

      <FormSection title="Parent / Guardian Contact">
        <FormField label="First Name">
          <input className={FIELD_CLS} value={form.guardian_first_name||''} onChange={e=>set('guardian_first_name',e.target.value)} />
        </FormField>
        <FormField label="Last Name">
          <input className={FIELD_CLS} value={form.guardian_last_name||''} onChange={e=>set('guardian_last_name',e.target.value)} />
        </FormField>
        <FormField label="Phone">
          <input type="text" inputMode="tel" className={FIELD_CLS} placeholder="(555) 555-5555"
            value={form.guardian_phone||''} onChange={e=>set('guardian_phone',e.target.value)} />
        </FormField>
        <FormField label="Email">
          <input type="email" className={FIELD_CLS} value={form.guardian_email||''} onChange={e=>set('guardian_email',e.target.value)} />
        </FormField>
      </FormSection>

      <FormSection title="Enrollment Appointment">
        <FormField label="Appointment Date / Time">
          <input type="datetime-local" className={FIELD_CLS} value={form.enrollment_appointment_time||''} onChange={e=>set('enrollment_appointment_time',e.target.value)} />
        </FormField>
        <FormField label="Appointment Result">
          <select className={FIELD_CLS} value={form.enrollment_appointment_result||''} onChange={e=>set('enrollment_appointment_result',e.target.value)}>
            <option value="">None Selected</option>
            {APPOINTMENT_RESULTS.map(o=><option key={o}>{o}</option>)}
          </select>
        </FormField>
        <FormField label="Center Phone">
          <input type="text" inputMode="tel" className={FIELD_CLS} placeholder="Auto-filled from center"
            value={form.center_phone||''} onChange={e=>set('center_phone',e.target.value)} />
        </FormField>
        <FormField label="Center Address" span>
          <input className={FIELD_CLS} placeholder="Auto-filled when center is selected above"
            value={form.center_address||''} onChange={e=>set('center_address',e.target.value)} />
        </FormField>
      </FormSection>

      <div className="flex items-center gap-3 pt-2 pb-8">
        <button onClick={save} disabled={saving}
          className="text-white px-7 py-2.5 rounded-xl font-semibold text-sm disabled:opacity-50 transition hover:opacity-90" style={{background:'#5ba300'}}>
          {saving?'Saving…':'Save Changes'}
        </button>
        {saved && <span className="text-green-700 text-sm font-semibold">✓ Saved!</span>}
      </div>
    </div>
  );
}

// ─── DOCUMENTS TAB ────────────────────────────────────────────────────────────
function DocumentsTab({ studentId, user }) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showAdd, setShowAdd] = useState(false);
  const [form, setForm] = useState({ type:DOC_TYPES[0], filename:'', drive_url:'', notes:'' });
  const [saving, setSaving] = useState(false);
  useEffect(()=>{
    return db.collection('students').doc(studentId).collection('documents')
      .orderBy('uploaded_at','desc').onSnapshot(snap=>{
        setDocs(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);
      });
  },[studentId]);
  async function add() {
    if(!form.drive_url.trim()) return; setSaving(true);
    try {
      await db.collection('students').doc(studentId).collection('documents').add({
        ...form, uploaded_by:user.displayName||user.email,
        uploaded_at:firebase.firestore.FieldValue.serverTimestamp(),
      });
      setForm({type:DOC_TYPES[0],filename:'',drive_url:'',notes:''}); setShowAdd(false);
    } finally { setSaving(false); }
  }
  async function del(id) {
    if(!confirm('Remove this document?')) return;
    await db.collection('students').doc(studentId).collection('documents').doc(id).delete();
  }
  const grouped = DOC_TYPES.reduce((a,t)=>({...a,[t]:docs.filter(d=>d.type===t)}),[]);
  return (
    <div>
      <div className="flex items-center justify-between mb-5">
        <p className="text-sm text-gray-500">Upload docs to Google Drive, then paste the shareable link here.</p>
        <button onClick={()=>setShowAdd(!showAdd)} className="text-white px-4 py-2 rounded-xl text-sm font-semibold ml-4 hover:opacity-90" style={{background:'#5ba300'}}>
          + Add Document
        </button>
      </div>
      {showAdd && (
        <div className="bg-gray-50 rounded-2xl p-5 mb-5 border border-gray-200">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">Document Type</label>
              <select className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm"
                value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                {DOC_TYPES.map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs font-semibold text-gray-500 mb-1">File Name / Description</label>
              <input className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm"
                placeholder="e.g. John Smith State ID" value={form.filename} onChange={e=>setForm(f=>({...f,filename:e.target.value}))} />
            </div>
          </div>
          <div className="mb-3">
            <label className="block text-xs font-semibold text-gray-500 mb-1">Google Drive Link *</label>
            <input className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm"
              placeholder="https://drive.google.com/..." value={form.drive_url} onChange={e=>setForm(f=>({...f,drive_url:e.target.value}))} />
          </div>
          <div className="mb-3">
            <label className="block text-xs font-semibold text-gray-500 mb-1">Notes (optional)</label>
            <input className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm"
              value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} />
          </div>
          <div className="flex gap-2">
            <button onClick={add} disabled={saving||!form.drive_url.trim()}
              className="text-white px-5 py-2 rounded-xl text-sm font-semibold disabled:opacity-50 hover:opacity-90" style={{background:'#5ba300'}}>
              {saving?'Saving…':'Save'}
            </button>
            <button onClick={()=>setShowAdd(false)} className="text-gray-400 text-sm px-2">Cancel</button>
          </div>
        </div>
      )}
      {loading ? <div className="text-center py-10 text-gray-400 text-sm">Loading…</div> :
        docs.length===0 ? (
          <div className="text-center py-14 text-gray-300">
            <div className="text-4xl mb-2">📁</div>
            <div className="text-sm font-medium">No documents added yet</div>
          </div>
        ) : (
          <div className="space-y-5">
            {DOC_TYPES.map(type=>{
              const td=grouped[type]||[];
              if(!td.length) return null;
              return (
                <div key={type}>
                  <h4 className="text-xs font-bold uppercase tracking-widest mb-2" style={{color:'#5ba300'}}>{type}</h4>
                  <div className="space-y-2">
                    {td.map(d=>(
                      <div key={d.id} className="bg-white border border-gray-100 rounded-2xl p-4 flex items-center gap-3 shadow-sm">
                        <div className="text-2xl">📄</div>
                        <div className="flex-1 min-w-0">
                          <div className="font-semibold text-sm truncate">{d.filename||d.type}</div>
                          {d.notes && <div className="text-xs text-gray-500">{d.notes}</div>}
                          <div className="text-xs text-gray-400 mt-0.5">Added by {d.uploaded_by} · {timeAgo(d.uploaded_at)}</div>
                        </div>
                        <div className="flex gap-3 items-center">
                          <a href={d.drive_url} target="_blank" rel="noreferrer" className="text-sm font-semibold hover:opacity-80" style={{color:'#5ba300'}}>Open →</a>
                          <button onClick={()=>del(d.id)} className="text-red-400 hover:text-red-600 text-xs">Remove</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        )
      }
    </div>
  );
}

// ─── EMAIL MODAL ─────────────────────────────────────────────────────────────
function EmailModal({ student, onClose }) {
  const templates = [
    { name:'Enrollment Confirmation', subject:`Success VLCM – Enrollment Inquiry Confirmation`,
      body:`Hi ${student.guardian_first_name||student.student_first_name||'there'},\n\nThank you for reaching out to Success Virtual Learning Centers of Michigan! We received your inquiry and are excited to connect.\n\nWe will be reaching out shortly to schedule your enrollment appointment.\n\nWarm regards,\nSuccess VLCM Enrollment Team` },
    { name:'Appointment Reminder', subject:`Reminder: Your Appointment with Success VLCM`,
      body:`Hi ${student.guardian_first_name||student.student_first_name||'there'},\n\nThis is a friendly reminder about your upcoming enrollment appointment with Success Virtual Learning Centers of Michigan.\n\nPlease have any relevant documents ready if possible.\n\nLooking forward to speaking with you!\n\nWarm regards,\nSuccess VLCM` },
    { name:'Documents Needed', subject:`Documents Needed – Success VLCM Enrollment`,
      body:`Hi ${student.guardian_first_name||student.student_first_name||'there'},\n\nThank you for meeting with us! To continue with enrollment, we need a few documents:\n\n• State-issued photo ID\n• Most recent transcript\n• IEP or 504 Plan (if applicable)\n\nPlease send these at your earliest convenience.\n\nWarm regards,\nSuccess VLCM` },
  ];
  const [sel, setSel] = useState(0);
  const email = student.guardian_email || student.student_email;
  function send() {
    if(!email){alert('No email on file. Add one in the Details tab first.');return;}
    window.open(`https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(email)}&su=${encodeURIComponent(templates[sel].subject)}&body=${encodeURIComponent(templates[sel].body)}`,'_blank');
    onClose();
  }
  return (
    <Modal title="Send Email" onClose={onClose}>
      <div className="mb-3">
        <label className="block text-xs font-semibold text-gray-500 mb-1">Template</label>
        <select className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" onChange={e=>setSel(parseInt(e.target.value))}>
          {templates.map((t,i)=><option key={i} value={i}>{t.name}</option>)}
        </select>
      </div>
      <div className="mb-3">
        <label className="block text-xs font-semibold text-gray-500 mb-1">Subject</label>
        <div className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50">{templates[sel].subject}</div>
      </div>
      <div className="mb-4">
        <label className="block text-xs font-semibold text-gray-500 mb-1">Preview</label>
        <div className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 whitespace-pre-wrap text-gray-600 max-h-40 overflow-y-auto">{templates[sel].body}</div>
      </div>
      {!email && <p className="text-orange-500 text-xs mb-3">⚠ No email on file. Add one in Details first.</p>}
      <div className="flex gap-2">
        <button onClick={send} className="text-white px-5 py-2 rounded-xl text-sm font-semibold hover:opacity-90" style={{background:'#5ba300'}}>
          Open in Gmail →
        </button>
        <button onClick={onClose} className="text-gray-400 text-sm px-3">Cancel</button>
      </div>
    </Modal>
  );
}

// Saves on blur, not every keystroke — avoids Firestore re-render loop in header
function AssignedInput({ studentId, value, onSave }) {
  const [local, setLocal] = useState(value);
  useEffect(()=>setLocal(value),[value]);
  return (
    <input type="text" value={local} placeholder="Unassigned"
      onChange={e=>setLocal(e.target.value)}
      onBlur={()=>{ if(local!==value) onSave(local); }}
      className="text-xs border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-1 focus:ring-green-400 text-gray-700 w-28 bg-white" />
  );
}

// ─── STUDENT PROFILE ─────────────────────────────────────────────────────────
function StudentProfile({ studentId, user, onBack }) {
  const [student, setStudent] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('activity');
  const [showStatusDrop, setShowStatusDrop] = useState(false);
  const [showStageDrop, setShowStageDrop] = useState(false);
  const [adminCenters, setAdminCenters] = useState([]);

  useEffect(()=>{
    return db.collection('students').doc(studentId).onSnapshot(snap=>{
      if(snap.exists) setStudent({id:snap.id,...snap.data()}); setLoading(false);
    });
  },[studentId]);

  useEffect(()=>{
    db.collection('settings').doc('centers').get().then(snap=>{
      if(snap.exists) setAdminCenters(snap.data().list||[]);
    });
  },[]);

  async function updateField(updates, logMsg) {
    await db.collection('students').doc(studentId).update({...updates, updated_at:firebase.firestore.FieldValue.serverTimestamp()});
    if(logMsg) await db.collection('students').doc(studentId).collection('activities').add({
      type:'note', content:logMsg, created_by:user.displayName||user.email,
      created_at:firebase.firestore.FieldValue.serverTimestamp(),
    });
  }

  async function setCenter(centerName) {
    const info = adminCenters.find(c=>c.name===centerName);
    const updates = { learning_center: centerName };
    if(info) {
      if(info.address) updates.center_address = info.address;
      if(info.phone)   updates.center_phone   = info.phone;
      if(info.email)   updates.center_email   = info.email;
    }
    await updateField(updates, `Learning center set to: ${centerName}`);
  }

  if(loading) return <div className="flex items-center justify-center h-64 text-gray-400">Loading…</div>;
  if(!student) return <div className="flex items-center justify-center h-64 text-gray-400">Student not found.</div>;

  const currentStage = student.stage || stageFromStatus(student.lead_status);
  const stageInfo = STAGES.find(s=>s.key===currentStage)||STAGES[0];
  const initials = `${(student.student_first_name||'?')[0]}${(student.student_last_name||'')[0]}`.toUpperCase();
  const contactPhone = student.student_phone || student.guardian_phone;

  return (
    <div className="fade-in flex flex-col h-full">
      {/* Header */}
      <div className="bg-white border-b border-gray-100 shadow-sm">
        <div className="px-6 pt-4 pb-0">
          <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-600 mb-3 flex items-center gap-1 transition">
            ← All Leads
          </button>
          <div className="flex flex-wrap items-start gap-4 mb-4">
            {/* Avatar */}
            <div className="w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-extrabold text-white flex-shrink-0"
              style={{background:'linear-gradient(135deg,#5ba300,#5ba300)'}}>
              {initials}
            </div>
            {/* Name + tags */}
            <div className="flex-1 min-w-0">
              <h1 className="text-xl font-extrabold text-gray-900">{student.student_first_name} {student.student_last_name}</h1>
              <div className="flex flex-wrap items-center gap-2 mt-2">
                {/* Status — clickable */}
                <div className="relative">
                  <button onClick={()=>{setShowStatusDrop(!showStatusDrop);setShowStageDrop(false);}}>
                    <StatusBadge status={student.lead_status} />
                  </button>
                  {showStatusDrop && (
                    <div className="absolute top-8 left-0 bg-white border border-gray-100 rounded-2xl shadow-xl z-30 py-1 w-72 max-h-64 overflow-y-auto">
                      {LEAD_STATUSES.map(s=>(
                        <button key={s} onClick={()=>{updateField({lead_status:s},`Status changed to: ${s}`);setShowStatusDrop(false);}}
                          className={`w-full text-left px-4 py-2 text-sm hover:bg-gray-50 ${student.lead_status===s?'font-bold text-green-700':''}`}>{s}</button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>

            {/* Right: Stage + Source + Assigned To + Call */}
            <div className="flex flex-col items-end gap-2 ml-auto flex-shrink-0">
              {/* Stage dropdown */}
              <div className="relative">
                <button onClick={()=>{setShowStageDrop(!showStageDrop);setShowStatusDrop(false);}}
                  className={`status-badge ${stageInfo.color} cursor-pointer hover:opacity-80 transition pr-3`}>
                  {stageInfo.label} ▾
                </button>
                {showStageDrop && (
                  <div className="absolute right-0 top-8 bg-white border border-gray-100 rounded-2xl shadow-xl z-30 py-1 w-48">
                    {STAGES.map(s=>(
                      <button key={s.key} onClick={()=>{updateField({stage:s.key},`Stage changed to: ${s.label}`);setShowStageDrop(false);}}
                        className={`w-full text-left px-4 py-2 text-sm hover:bg-gray-50 ${currentStage===s.key?'font-bold text-green-700':''}`}>{s.label}</button>
                    ))}
                  </div>
                )}
              </div>
              {/* Lead Source */}
              <div className="flex items-center gap-1.5">
                <span className="text-xs text-gray-400 font-medium whitespace-nowrap">Source:</span>
                <select value={student.lead_source||''} onChange={e=>updateField({lead_source:e.target.value},`Lead source set to: ${e.target.value}`)}
                  className="text-xs border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-1 focus:ring-green-400 text-gray-700 bg-white">
                  <option value="">Not set</option>
                  {LEAD_SOURCES.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
              </div>
              {/* Assigned To */}
              <div className="flex items-center gap-1.5">
                <span className="text-xs text-gray-400 font-medium whitespace-nowrap">Assigned:</span>
                <AssignedInput studentId={studentId} value={student.lead_owner||''} onSave={v=>updateField({lead_owner:v})} />
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1">
            {[['activity','Overview'],['details','Student Details'],['documents','Student Documents']].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)}
                className={`px-4 py-2.5 text-sm font-semibold transition border-b-2 ${tab===k?'border-green-700 text-green-700':'border-transparent text-gray-400 hover:text-gray-600'}`}
                style={tab===k?{borderColor:'#5ba300',color:'#5ba300'}:{}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Tab content */}
      <div className="flex-1 overflow-y-auto p-6">
        {tab==='activity' && (
          <div className="flex gap-5 items-start">
            <QuickInfoSidebar student={student} />
            <div className="flex-1 min-w-0">
              <div className="flex items-center justify-between mb-4 pb-3 border-b border-gray-100">
                <div>
                  <h2 className="font-bold text-gray-800 text-base">Activity Log</h2>
                  <p className="text-xs text-gray-400 mt-0.5">All calls, texts, notes, and emails for this student</p>
                </div>
              </div>
              <ActivityFeed studentId={studentId} user={user} />
            </div>
          </div>
        )}
        {tab==='details' && <DetailsForm student={student} studentId={studentId} user={user} adminCenters={adminCenters} />}
        {tab==='documents' && <DocumentsTab studentId={studentId} user={user} />}
      </div>
    </div>
  );
}

// ─── NEW LEAD MODAL ──────────────────────────────────────────────────────────
function NewLeadModal({ user, onClose, onCreated }) {
  const [form, setForm] = useState({
    student_first_name:'', student_last_name:'',
    student_phone:'', student_email:'',
    guardian_first_name:'', guardian_last_name:'', guardian_phone:'', guardian_email:'',
    learning_center:'', lead_status:'New Inquiry', lead_source:'Website',
    lead_owner: user.displayName||user.email, stage:'open',
  });
  const [saving, setSaving] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  async function create() {
    if(!form.student_first_name&&!form.guardian_first_name) return;
    setSaving(true);
    try {
      const ref = await db.collection('students').add({...form, created_at:firebase.firestore.FieldValue.serverTimestamp(), updated_at:firebase.firestore.FieldValue.serverTimestamp()});
      await db.collection('students').doc(ref.id).collection('activities').add({
        type:'note', content:`Inquiry created. Status: ${form.lead_status}.`,
        created_by:user.displayName||user.email, created_at:firebase.firestore.FieldValue.serverTimestamp(),
      });
      onCreated(ref.id);
    } finally { setSaving(false); }
  }
  const Inp = (k,placeholder='',type='text')=>(
    <input type={type} className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
      placeholder={placeholder} value={form[k]||''} onChange={e=>set(k,e.target.value)} />
  );
  return (
    <Modal title="Add New Inquiry" onClose={onClose} wide>
      <div className="grid grid-cols-2 gap-x-4 gap-y-3">
        <div className="col-span-2"><p className="text-xs font-bold uppercase tracking-wider mb-1" style={{color:'#5ba300'}}>Student</p></div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">First Name *</label>{Inp('student_first_name','First')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Last Name *</label>{Inp('student_last_name','Last')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Phone</label>{Inp('student_phone','(555) 555-5555','tel')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Email</label>{Inp('student_email','student@email.com','email')}</div>

        <div className="col-span-2 mt-2"><p className="text-xs font-bold uppercase tracking-wider mb-1" style={{color:'#5ba300'}}>Parent / Guardian</p></div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">First Name</label>{Inp('guardian_first_name','First')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Last Name</label>{Inp('guardian_last_name','Last')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Phone</label>{Inp('guardian_phone','(555) 555-5555','tel')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Email</label>{Inp('guardian_email','parent@email.com','email')}</div>

        <div className="col-span-2 mt-2"><p className="text-xs font-bold uppercase tracking-wider mb-1" style={{color:'#5ba300'}}>Enrollment</p></div>
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-1">Learning Center</label>
          <select className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" value={form.learning_center} onChange={e=>set('learning_center',e.target.value)}>
            <option value="">None Selected</option>
            {LEARNING_CENTERS.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-1">Initial Status</label>
          <select className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm" value={form.lead_status} onChange={e=>set('lead_status',e.target.value)}>
            {LEAD_STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Source</label>{Inp('lead_source','Website, Referral, etc.')}</div>
        <div><label className="block text-xs font-semibold text-gray-500 mb-1">Assigned To</label>{Inp('lead_owner',user.displayName||user.email)}</div>
      </div>
      <div className="flex gap-2 mt-5 pt-4 border-t border-gray-100">
        <button onClick={create} disabled={saving||(!form.student_first_name&&!form.guardian_first_name)}
          className="text-white px-6 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 transition hover:opacity-90" style={{background:'#5ba300'}}>
          {saving?'Creating…':'Create Inquiry'}
        </button>
        <button onClick={onClose} className="text-gray-400 text-sm px-3 hover:text-gray-600">Cancel</button>
      </div>
    </Modal>
  );
}

// ─── PROFILE PAGE ────────────────────────────────────────────────────────────
function ProfilePage({ user }) {
  const [displayName, setDisplayName] = useState(user.displayName || '');
  const [phone, setPhone]             = useState('');
  const [title, setTitle]             = useState('');
  const [saving, setSaving]           = useState(false);
  const [saved, setSaved]             = useState(false);

  // Load saved profile extras from Firestore
  useEffect(() => {
    db.collection('users').doc(user.uid).get().then(doc => {
      if (doc.exists) {
        const d = doc.data();
        setPhone(d.phone || '');
        setTitle(d.title || '');
      }
    });
  }, []);

  async function save() {
    setSaving(true);
    // Update display name in Firebase Auth
    await user.updateProfile({ displayName });
    // Save extras to Firestore
    await db.collection('users').doc(user.uid).set({ displayName, phone, title }, { merge: true });
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  }

  return (
    <div className="max-w-xl mx-auto px-6 py-10 fade-in">
      <h1 className="text-2xl font-extrabold text-gray-900 mb-1">My Profile</h1>
      <p className="text-sm text-gray-400 mb-8">Update your name, title, and contact info.</p>

      {/* Avatar */}
      <div className="flex items-center gap-4 mb-8 p-5 bg-white rounded-2xl border border-gray-100 shadow-sm">
        {user.photoURL
          ? <img src={user.photoURL} referrerPolicy="no-referrer" alt="" className="w-16 h-16 rounded-full" />
          : <div className="w-16 h-16 rounded-full flex items-center justify-center text-2xl font-bold text-white" style={{background:'#3b4f5f'}}>
              {(user.displayName||user.email||'?')[0].toUpperCase()}
            </div>}
        <div>
          <div className="font-bold text-gray-800">{user.displayName || user.email}</div>
          <div className="text-sm text-gray-400">{user.email}</div>
          <div className="text-xs text-gray-300 mt-1">Profile photo managed by your Google account</div>
        </div>
      </div>

      {/* Editable fields */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-5 mb-6">
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-1">Display Name</label>
          <input className={FIELD_CLS} value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder="Your name" />
        </div>
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-1">Job Title</label>
          <input className={FIELD_CLS} value={title} onChange={e=>setTitle(e.target.value)} placeholder="e.g. Enrollment Specialist" />
        </div>
        <div>
          <label className="block text-xs font-semibold text-gray-500 mb-1">Work Phone</label>
          <input className={FIELD_CLS} value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(555) 555-5555" inputMode="tel" />
        </div>
      </div>

      {/* Google account notice */}
      <div className="flex gap-3 bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 text-sm text-blue-700">
        <span className="text-lg flex-shrink-0">🔐</span>
        <div>Your email and password are managed through your <strong>Google account</strong>. To change them, visit <a href="https://myaccount.google.com" target="_blank" className="underline">myaccount.google.com</a>.</div>
      </div>

      <button onClick={save} disabled={saving}
        className="text-white px-6 py-2.5 rounded-xl text-sm font-semibold disabled:opacity-50 hover:opacity-90 transition flex items-center gap-2" style={{background:'#5ba300'}}>
        {saving ? 'Saving…' : saved ? '✓ Saved!' : 'Save Changes'}
      </button>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function MainApp({ user }) {
  const [page, setPage]         = useState('dashboard');
  const [studentId, setStudentId] = useState(null);
  const [showNew, setShowNew]   = useState(false);
  const [isAdmin, setIsAdmin]   = useState(false);

  useEffect(() => {
    db.collection('settings').doc('admins').get().then(doc => {
      if (doc.exists) setIsAdmin((doc.data().emails||[]).includes(user.email));
    });
  }, [user.email]);

  function openStudent(id) { setStudentId(id); setPage('student'); }
  function goList() { setPage('list'); setStudentId(null); }
  function handleSetPage(p) { setPage(p); setStudentId(null); }

  return (
    <div className="min-h-screen flex flex-col">
      <Navbar user={user} page={page} setPage={handleSetPage} isAdmin={isAdmin} />
      {showNew && <NewLeadModal user={user} onClose={()=>setShowNew(false)} onCreated={id=>{setShowNew(false);openStudent(id);}} />}
      <div className="flex-1">
        {page==='dashboard' && <DashboardPage onSelect={openStudent} />}
        {page==='list' && <LeadsListPage user={user} onSelect={openStudent} onAddNew={()=>setShowNew(true)} />}
        {page==='student' && studentId && <StudentProfile studentId={studentId} user={user} onBack={goList} />}
        {page==='admin' && <AdminPage user={user} />}
        {page==='profile' && <ProfilePage user={user} />}
      </div>
    </div>
  );
}

// ─── ROOT ────────────────────────────────────────────────────────────────────
function Root() {
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  useEffect(()=>{
    const unsub = auth.onAuthStateChanged(u=>{ setUser(u); setAuthLoading(false); });
    return ()=>unsub();
  },[]);
  if(authLoading) return <div className="min-h-screen flex items-center justify-center text-gray-400">Loading…</div>;
  if(!user) return <LoginPage />;
  return <MainApp user={user} />;
}

// Fetch config from Vercel env vars, then boot the app
fetch('/api/config')
  .then(r => r.json())
  .then(config => {
    firebase.initializeApp(config);
    db = firebase.firestore();
    auth = firebase.auth();
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  })
  .catch(e => {
    document.getElementById('root').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#888">Failed to connect. Please try refreshing.</div>';
    console.error('Config load failed:', e);
  });
</script>
</body>
</html>
